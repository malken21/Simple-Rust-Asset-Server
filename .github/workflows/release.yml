name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/simple-rust-asset-server
          generate_release_notes: true
