name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Release - ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: simple-rust-asset-server-linux-x64
          - os: windows-latest
            asset_name: simple-rust-asset-server-windows-x64.exe
          - os: ubuntu-24.04-arm
            asset_name: simple-rust-asset-server-linux-arm64
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build
        run: cargo build --release --verbose

      - name: Get Binary Path
        id: bin
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=target/release/simple-rust-asset-server.exe" >> $GITHUB_OUTPUT
          else
            echo "path=target/release/simple-rust-asset-server" >> $GITHUB_OUTPUT
          fi

      - name: Rename Binary for Release
        shell: bash
        run: |
          cp ${{ steps.bin.outputs.path }} ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: ${{ matrix.os == 'ubuntu-latest' }}