name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build - ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: simple-rust-asset-server-linux-x64
          - os: ubuntu-24.04-arm
            asset_name: simple-rust-asset-server-linux-arm64
          - os: windows-latest
            asset_name: simple-rust-asset-server-windows-x64.exe
          - os: windows-latest
            asset_name: simple-rust-asset-server-windows-arm64.exe
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            asset_name: simple-rust-asset-server-macos-x64
            target: x86_64-apple-darwin
          - os: macos-latest
            asset_name: simple-rust-asset-server-macos-arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" != "" ]]; then
            cargo build --release --verbose --target ${{ matrix.target }}
          else
            cargo build --release --verbose
          fi

      - name: Get Binary Path
        id: bin
        shell: bash
        run: |
          TARGET_DIR="target/release"
          if [[ "${{ matrix.target }}" != "" ]]; then
            TARGET_DIR="target/${{ matrix.target }}/release"
          fi
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=${TARGET_DIR}/simple-rust-asset-server.exe" >> $GITHUB_OUTPUT
          else
            echo "path=${TARGET_DIR}/simple-rust-asset-server" >> $GITHUB_OUTPUT
          fi

      - name: Rename Binary for Release
        shell: bash
        run: |
          cp ${{ steps.bin.outputs.path }} ${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true